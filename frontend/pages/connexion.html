<!DOCTYPE html>
<html lang="fr" data-theme="sombre">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion — AI Math Chatbot</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="../css/style.css" rel="stylesheet">
</head>
<body style="overflow:auto;">

  <div class="auth-wrapper">
    <div class="auth-card">

      <!-- Logo -->
      <div class="auth-logo">
        <i class="bi bi-calculator"></i>
      </div>

      <h3>Bon retour !</h3>
      <p class="text-secondary">Connectez-vous pour retrouver votre historique</p>

      <!-- Formulaire -->
      <form id="form-connexion">
        <div class="mb-3">
          <label for="email">Adresse email</label>
          <input type="email" class="form-control" id="email" placeholder="vous@exemple.com" required>
        </div>

        <div class="mb-2">
          <label for="mot-de-passe">Mot de passe</label>
          <div class="password-field">
            <input type="password" class="form-control" id="mot-de-passe" placeholder="••••••••" required>
            <i class="bi bi-eye password-toggle" data-target="mot-de-passe"></i>
          </div>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-3 mt-2">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="se-souvenir">
            <label class="form-check-label small text-secondary" for="se-souvenir">
              Se souvenir de moi
            </label>
          </div>
          <a href="#" class="small" style="color:#4f6ef7; text-decoration:none;">Mot de passe oublié ?</a>
        </div>

        <button type="submit" class="btn btn-primary btn-primary-full">
          Se connecter
        </button>
      </form>

      <!-- Séparateur -->
      <div class="auth-separator">ou</div>

      <!-- Accès anonyme -->
      <button class="btn-anonyme" id="btn-continuer-anonyme">
        <i class="bi bi-person-x me-2"></i> Continuer sans compte
      </button>

      <!-- Lien inscription -->
      <div class="auth-footer">
        Pas encore de compte ? <a href="inscription.html">Créer un compte</a>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // Afficher/Masquer le mot de passe
    document.querySelectorAll(".password-toggle").forEach(icon => {
      icon.addEventListener("click", () => {
        const target = document.getElementById(icon.getAttribute("data-target"));
        const showing = target.type === "text";
        target.type = showing ? "password" : "text";
        icon.className = showing ? "bi bi-eye password-toggle" : "bi bi-eye-slash password-toggle";
        icon.setAttribute("data-target", icon.getAttribute("data-target"));
      });
    });

    // Soumission du formulaire (à connecter au backend)
    document.getElementById("form-connexion").addEventListener("submit", (e) => {
      e.preventDefault();
      // TODO: POST /api/auth/login
      window.location.href = "../index.html";
    });

    // Continuer sans compte
    document.getElementById("btn-continuer-anonyme").addEventListener("click", () => {
      // TODO: créer un utilisateur "anonyme" côté backend
      window.location.href = "../index.html";
    });

    // Applique le thème sauvegardé
    const themeEnregistre = localStorage.getItem("theme") || "sombre";
    document.documentElement.setAttribute("data-theme", themeEnregistre);
  </script>
</body>
</html>
