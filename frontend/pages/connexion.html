<!DOCTYPE html>
<html lang="fr" data-theme="sombre">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion - AI Math Chatbot</title>
  
  <link href="../css/bootstrap.min.css" rel="stylesheet">
  <link href="../vendor/bootstrap-icons/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="../css/style.css" rel="stylesheet">
</head>
<body class="auth-body">

  <div class="auth-card p-4 mx-3">
    <div class="text-center mb-4">
      <span class="auth-logo"><i class="bi bi-calculator-fill"></i></span>
      <h3 class="fw-bold mt-2 text-light">Bon retour !</h3>
      <p class="text-muted small mb-0">Connectez-vous pour retrouver vos exercices de mathématiques</p>
    </div>

    <form id="form-connexion">
      <div class="alert alert-danger d-none small p-2" id="error-message" role="alert"></div>

      <div class="mb-3">
        <label for="email" class="form-label text-secondary small fw-medium">Adresse Email</label>
        <input type="email" class="form-control auth-input" id="email" placeholder="nom@exemple.com" required autocomplete="email">
      </div>

      <div class="mb-4">
        <label for="password" class="form-label text-secondary small fw-medium">Mot de passe</label>
        <input type="password" class="form-control auth-input" id="password" placeholder="••••••••" required autocomplete="current-password">
      </div>

      <button type="submit" class="btn btn-primary w-100 rounded-pill fw-semibold py-2 shadow-sm">
        Se connecter
      </button>
    </form>

    <div class="text-center mt-4 border-top border-secondary pt-3">
      <p class="text-muted small mb-0">
        Nouveau sur la plateforme ? <a href="inscription.html" class="text-primary text-decoration-none fw-medium">Créer un compte</a>
      </p>
      <a href="../index.html" class="text-secondary small d-inline-block mt-2 text-decoration-none">
        <i class="bi bi-arrow-left"></i> Retour au chat public
      </a>
    </div>
  </div>

  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/theme.js"></script>
</body>
</html>
