<!DOCTYPE html>
<html lang="fr" data-theme="sombre">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inscription — AI Math Chatbot</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="../css/style.css" rel="stylesheet">
</head>
<body style="overflow:auto;">

  <div class="auth-wrapper">
    <div class="auth-card">

      <!-- Logo -->
      <div class="auth-logo">
        <i class="bi bi-calculator"></i>
      </div>

      <h3>Créer un compte</h3>
      <p class="text-secondary">Sauvegardez votre historique et vos préférences</p>

      <!-- Formulaire -->
      <form id="form-inscription">
        <div class="mb-3">
          <label for="nom">Nom complet</label>
          <input type="text" class="form-control" id="nom" placeholder="Votre nom" required>
        </div>

        <div class="mb-3">
          <label for="email">Adresse email</label>
          <input type="email" class="form-control" id="email" placeholder="vous@exemple.com" required>
        </div>

        <div class="mb-3">
          <label for="mot-de-passe">Mot de passe</label>
          <div class="password-field">
            <input type="password" class="form-control" id="mot-de-passe" placeholder="8 caractères minimum" required minlength="8">
            <i class="bi bi-eye password-toggle" data-target="mot-de-passe"></i>
          </div>
        </div>

        <div class="mb-3">
          <label for="confirmation">Confirmer le mot de passe</label>
          <div class="password-field">
            <input type="password" class="form-control" id="confirmation" placeholder="••••••••" required minlength="8">
            <i class="bi bi-eye password-toggle" data-target="confirmation"></i>
          </div>
        </div>

        <div class="form-check mb-3">
          <input class="form-check-input" type="checkbox" id="accepter-conditions" required>
          <label class="form-check-label small text-secondary" for="accepter-conditions">
            J'accepte les conditions d'utilisation
          </label>
        </div>

        <button type="submit" class="btn btn-primary btn-primary-full">
          Créer mon compte
        </button>
      </form>

      <!-- Séparateur -->
      <div class="auth-separator">ou</div>

      <!-- Accès anonyme -->
      <button class="btn-anonyme" id="btn-continuer-anonyme">
        <i class="bi bi-person-x me-2"></i> Continuer sans compte
      </button>

      <!-- Lien connexion -->
      <div class="auth-footer">
        Déjà un compte ? <a href="connexion.html">Se connecter</a>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // Afficher/Masquer le mot de passe
    document.querySelectorAll(".password-toggle").forEach(icon => {
      icon.addEventListener("click", () => {
        const target = document.getElementById(icon.getAttribute("data-target"));
        const showing = target.type === "text";
        target.type = showing ? "password" : "text";
        icon.className = showing ? "bi bi-eye password-toggle" : "bi bi-eye-slash password-toggle";
      });
    });

    // Soumission du formulaire
    document.getElementById("form-inscription").addEventListener("submit", (e) => {
      e.preventDefault();

      const mdp = document.getElementById("mot-de-passe").value;
      const confirmation = document.getElementById("confirmation").value;

      if (mdp !== confirmation) {
        alert("Les mots de passe ne correspondent pas.");
        return;
      }

      // TODO: POST /api/auth/register
      window.location.href = "../index.html";
    });

    // Continuer sans compte
    document.getElementById("btn-continuer-anonyme").addEventListener("click", () => {
      // TODO: créer un utilisateur "anonyme" côté backend
      window.location.href = "../index.html";
    });

    // Applique le thème sauvegardé
    const themeEnregistre = localStorage.getItem("theme") || "sombre";
    document.documentElement.setAttribute("data-theme", themeEnregistre);
  </script>
</body>
</html>
