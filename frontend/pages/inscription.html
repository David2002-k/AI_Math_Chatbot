<!DOCTYPE html>
<html lang="fr" data-theme="sombre">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inscription - AI Math Chatbot</title>
  
  <link href="../css/bootstrap.min.css" rel="stylesheet">
  <link href="../vendor/bootstrap-icons/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="../css/style.css" rel="stylesheet">
</head>
<body class="auth-body">

  <div class="auth-card p-4 mx-3" style="max-width: 440px;">
    <div class="text-center mb-3">
      <span class="auth-logo"><i class="bi bi-person-plus-fill"></i></span>
      <h4 class="fw-bold mt-2 mb-1 text-light">Rejoignez-nous</h4>
      <p class="text-muted small mb-0">Créez votre profil pour sauvegarder vos historiques de calculs</p>
    </div>

    <form id="form-inscription">
      <div class="alert alert-danger d-none small p-2" id="error-message" role="alert"></div>

      <div class="mb-2">
        <label for="nom" class="form-label text-secondary small fw-medium">Nom complet / Pseudo</label>
        <input type="text" class="form-control auth-input" id="nom" placeholder="Ex: Boukare MAIGA" required autocomplete="name">
      </div>

      <div class="mb-2">
        <label for="email" class="form-label text-secondary small fw-medium">Adresse Email</label>
        <input type="email" class="form-control auth-input" id="email" placeholder="Daouda@exemple.com" required autocomplete="email">
      </div>

      <div class="mb-2">
        <label for="password" class="form-label text-secondary small fw-medium">Mot de passe</label>
        <input type="password" class="form-control auth-input" id="password" placeholder="Minimum 8 caractères" minlength="8" required autocomplete="new-password">
      </div>

      <div class="mb-3">
        <label for="password-confirm" class="form-label text-secondary small fw-medium">Confirmer le mot de passe</label>
        <input type="password" class="form-control auth-input" id="password-confirm" placeholder="••••••••" minlength="8" required autocomplete="new-password">
      </div>

      <button type="submit" class="btn btn-primary w-100 rounded-pill fw-semibold py-2 shadow-sm">
        S'inscrire
      </button>
    </form>

    <div class="text-center mt-3 border-top border-secondary pt-3">
      <p class="text-muted small mb-0">
        Vous possédez déjà un compte ? <a href="connexion.html" class="text-primary text-decoration-none fw-medium">Se connecter</a>
      </p>
    </div>
  </div>

  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/theme.js"></script>
</body>
</html>
