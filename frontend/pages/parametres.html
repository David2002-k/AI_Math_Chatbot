<!DOCTYPE html>
<html lang="fr" data-theme="sombre">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paramètres - AI Math Chatbot</title>
  
  <link href="../css/bootstrap.min.css" rel="stylesheet">
  <link href="../vendor/bootstrap-icons/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="../css/style.css" rel="stylesheet">
</head>
<body class="auth-body">

  <div class="auth-card p-4 mx-3" style="max-width: 500px;">
    <div class="d-flex align-items-center gap-2 mb-4">
      <a href="../index.html" class="btn btn-link text-secondary p-0 fs-4" aria-label="Retour au chatbot">
        <i class="bi bi-arrow-left-short"></i>
      </a>
      <h3 class="fw-bold m-0 text-light fs-4">Paramètres du compte</h3>
    </div>

    <div class="mb-4 pb-3 border-bottom border-secondary">
      <h6 class="text-primary fw-bold mb-3 small text-uppercase tracking-wider">Mon Profil</h6>
      <div class="d-flex align-items-center gap-3 mb-3">
        <span class="auth-logo" style="width:52px;height:52px;border-radius:14px;font-size:1.5rem;margin:0;"><i class="bi bi-person-fill"></i></span>
        <div>
          <h6 class="m-0 text-light fw-semibold" id="param-nom-utilisateur">Utilisateur</h6>
          <p class="m-0 text-muted small" id="param-email-utilisateur">Non connecté</p>
        </div>
      </div>
    </div>

    <div class="mb-4 pb-3 border-bottom border-secondary">
      <h6 class="text-primary fw-bold mb-3 small text-uppercase tracking-wider">Préférences</h6>
      <div class="d-flex align-items-center justify-content-between mb-3">
        <div>
          <span class="text-light small d-block fw-medium">Mode Sombre / Clair</span>
          <span class="text-muted d-block" style="font-size: 0.75rem;">Basculez le style de l'interface graphique</span>
        </div>
        <button class="btn btn-outline-secondary btn-sm rounded-pill px-3 text-light border-secondary" id="btn-toggle-theme-param" aria-label="Changer de thème">
          <i class="bi bi-sun"></i> Thème
        </button>
      </div>
    </div>

    <!-- Accès administration (affiché uniquement pour les admins) -->
    <a href="admin.html" id="lien-admin" class="btn btn-primary w-100 rounded-pill fw-semibold py-2 mb-3 d-none align-items-center justify-content-center gap-2">
      <i class="bi bi-shield-lock"></i> Tableau de bord administrateur
    </a>

    <div>
      <button class="btn btn-danger w-100 rounded-pill fw-semibold py-2 shadow-sm d-flex align-items-center justify-content-center gap-2" id="btn-logout-param">
        <i class="bi bi-box-arrow-right"></i> Se déconnecter
      </button>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
        const userData = localStorage.getItem("user");
        if (userData) {
            try {
                const user = JSON.parse(userData);
                document.getElementById("param-nom-utilisateur").innerText = user.nom || "Utilisateur";
                document.getElementById("param-email-utilisateur").innerText = user.email || "";
            } catch (e) {
                console.error("Erreur parsing user data");
            }
        }

        // Affiche le lien d'administration uniquement si l'utilisateur est admin.
        const token = localStorage.getItem("token");
        if (token) {
            fetch(`${API_URL}/api/admin/verifier`, {
                headers: { "Authorization": `Bearer ${token}` }
            })
            .then(r => r.ok ? r.json() : null)
            .then(data => {
                if (data && data.est_admin) {
                    const lien = document.getElementById("lien-admin");
                    lien.classList.remove("d-none");
                    lien.classList.add("d-flex");
                }
            })
            .catch(() => {});
        }

        const btnLogout = document.getElementById("btn-logout-param");
        if (btnLogout) {
            btnLogout.addEventListener("click", () => {
                localStorage.removeItem("token");
                localStorage.removeItem("user");
                window.location.href = "connexion.html";
            });
        }

        const btnThemeParam = document.getElementById("btn-toggle-theme-param");
        if (btnThemeParam) {
            btnThemeParam.addEventListener("click", () => {
                const htmlTag = document.documentElement;
                const currentTheme = htmlTag.getAttribute("data-theme");
                const newTheme = currentTheme === "sombre" ? "clair" : "sombre";
                
                htmlTag.setAttribute("data-theme", newTheme);
                localStorage.setItem("theme", newTheme);
                
                const icon = btnThemeParam.querySelector("i");
                if(icon) {
                    icon.className = newTheme === "sombre" ? "bi bi-sun" : "bi bi-moon-stars";
                }
            });
        }
    });
  </script>
  <script src="../js/api.js"></script>
  <script src="../js/theme.js"></script>
</body>
</html>
